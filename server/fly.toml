# Fly.io config for the RingKeeper server.
#
# Before first deploy, set:
#   - `app` below to a globally-unique name (or let `fly launch` name it)
#   - `primary_region` to one near you (list: `fly platform regions`)
# The SQLite file lives on a persistent volume mounted at /data, so call history
# survives restarts and redeploys.

app = "ringkeeper"
primary_region = "iad"   # <-- change to a region near you

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/ringkeeper.db"

# Persistent volume for the SQLite database. Create it once with:
#   fly volumes create ringkeeper_data --size 1 --region <same as primary_region>
[[mounts]]
  source = "ringkeeper_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep exactly one machine running at all times — WebSocket clients stay
  # connected and missed-call POSTs never wait on a cold start. SQLite is
  # single-writer, so do NOT scale this above 1 machine.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

# Health check hits the unauthenticated /health endpoint.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
